<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <title>Big QR Code Extension Icon</title>
  <desc>A toolbar icon combining QR code and barcode elements for a Chrome extension</desc>

  <!-- Rounded square background (squircle) -->
  <rect x="8" y="8" width="112" height="112" rx="22" ry="22" fill="#0A7EA5"/>

  <!-- QR Code Pattern - Left/Center -->
  <g fill="#FFFFFF">
    <!-- Top-left positioning square -->
    <rect x="20" y="20" width="28" height="28"/>
    <rect x="24" y="24" width="20" height="20" fill="#0A7EA5"/>
    <rect x="28" y="28" width="12" height="12"/>

    <!-- Top-right positioning square -->
    <rect x="80" y="20" width="28" height="28"/>
    <rect x="84" y="24" width="20" height="20" fill="#0A7EA5"/>
    <rect x="88" y="28" width="12" height="12"/>

    <!-- Bottom-left positioning square -->
    <rect x="20" y="80" width="28" height="28"/>
    <rect x="24" y="84" width="20" height="20" fill="#0A7EA5"/>
    <rect x="28" y="88" width="12" height="12"/>

    <!-- QR code data modules - center area -->
    <!-- Row 1 -->
    <rect x="52" y="20" width="4" height="4"/>
    <rect x="60" y="20" width="4" height="4"/>
    <rect x="68" y="20" width="4" height="4"/>
    <rect x="72" y="20" width="4" height="4"/>

    <!-- Row 2 -->
    <rect x="52" y="28" width="4" height="4"/>
    <rect x="56" y="28" width="4" height="4"/>
    <rect x="64" y="28" width="4" height="4"/>
    <rect x="72" y="28" width="4" height="4"/>

    <!-- Row 3 -->
    <rect x="52" y="36" width="4" height="4"/>
    <rect x="60" y="36" width="4" height="4"/>
    <rect x="68" y="36" width="4" height="4"/>
    <rect x="76" y="36" width="4" height="4"/>

    <!-- Row 4 -->
    <rect x="52" y="44" width="4" height="4"/>
    <rect x="56" y="44" width="8" height="4"/>
    <rect x="68" y="44" width="4" height="4"/>
    <rect x="76" y="44" width="4" height="4"/>

    <!-- Row 5 -->
    <rect x="52" y="52" width="4" height="4"/>
    <rect x="60" y="52" width="4" height="4"/>
    <rect x="68" y="52" width="4" height="4"/>
    <rect x="76" y="52" width="4" height="4"/>

    <!-- Row 6 -->
    <rect x="52" y="60" width="8" height="4"/>
    <rect x="64" y="60" width="4" height="4"/>
    <rect x="72" y="60" width="8" height="4"/>

    <!-- Row 7 -->
    <rect x="52" y="68" width="4" height="4"/>
    <rect x="60" y="68" width="4" height="4"/>
    <rect x="68" y="68" width="4" height="4"/>
    <rect x="76" y="68" width="4" height="4"/>

    <!-- Row 8 -->
    <rect x="52" y="76" width="4" height="4"/>
    <rect x="60" y="76" width="4" height="4"/>
    <rect x="68" y="76" width="4" height="4"/>

    <!-- Bottom center modules -->
    <rect x="60" y="84" width="4" height="4"/>
    <rect x="68" y="84" width="4" height="4"/>
    <rect x="76" y="84" width="4" height="4"/>
    <rect x="56" y="92" width="4" height="4"/>
    <rect x="64" y="92" width="4" height="4"/>
    <rect x="72" y="92" width="8" height="4"/>
    <rect x="60" y="100" width="4" height="4"/>
    <rect x="68" y="100" width="4" height="4"/>
  </g>

  <!-- Barcode Stripes - Right side integration -->
  <g fill="#FFFFFF">
    <rect x="104" y="56" width="4" height="24"/>
    <rect x="112" y="52" width="4" height="32"/>
    <rect x="116" y="60" width="4" height="20"/>
  </g>

  <!-- Additional barcode elements at bottom right -->
  <g fill="#FFFFFF" opacity="0.7">
    <rect x="104" y="92" width="3" height="16"/>
    <rect x="110" y="88" width="3" height="24"/>
    <rect x="116" y="94" width="3" height="14"/>
  </g>
</svg>