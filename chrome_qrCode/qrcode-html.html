<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>QR Code Test - qrcodejs</title>
  <style>
    body { font-family: sans-serif; padding: 20px; background: #f5f5f5; }
    .container { max-width: 500px; margin: 0 auto; background: #fff; padding: 24px; border-radius: 12px; box-shadow: 0 2px 12px rgba(0,0,0,.1); }
    h2 { margin-top: 0; color: #333; }
    textarea { width: 100%; height: 80px; padding: 10px; font-size: 14px; border: 1.5px solid #ddd; border-radius: 8px; resize: none; outline: none; box-sizing: border-box; font-family: monospace; }
    textarea:focus { border-color: #0A7EA5; box-shadow: 0 0 0 3px rgba(10,126,165,.12); }
    #preview { margin-top: 20px; text-align: center; background: #fafafa; border-radius: 8px; padding: 20px; border: 1.5px dashed #ddd; min-height: 200px; display: flex; align-items: center; justify-content: center; flex-direction: column; gap: 8px; }
    #preview canvas { max-width: 100%; }
    #preview .empty { color: #999; font-size: 14px; }
    .status { margin-top: 8px; font-size: 12px; color: #888; }
    .error { color: #e74c3c; font-size: 13px; margin-top: 8px; }
    .debug { font-size: 11px; color: #666; background: #f0f0f0; padding: 6px; border-radius: 4px; margin-top: 4px; word-break: break-all; }
  </style>
</head>
<body>
<div class="container">
  <h2>QR Code Test - qrcodejs</h2>
  <textarea id="input" placeholder="Type something here..."></textarea>
  <div id="preview"><div class="empty">Type above to generate QR code</div></div>
  <div class="status" id="status"></div>
  <div class="error" id="error"></div>
  <div class="debug" id="debug"></div>
</div>

<!-- davidshimjs/qrcodejs -->
<script src="js/qrcodejs.min.js"></script>
<script>
  const input   = document.getElementById('input');
  const preview = document.getElementById('preview');
  const status  = document.getElementById('status');
  const errorEl = document.getElementById('error');
  const debugEl = document.getElementById('debug');

  // Diagnostic: check library loaded correctly
  debugEl.textContent = 'QRCode loaded: ' + (typeof QRCode !== 'undefined') +
    ', CorrectLevel keys: ' + (typeof QRCode !== 'undefined' ? Object.keys(QRCode.CorrectLevel).join(', ') : 'N/A');

  let qrInstance = null;

  function renderQR(text) {
    errorEl.textContent = '';
    if (!text.trim()) {
      preview.innerHTML = '<div class="empty">Type above to generate QR code</div>';
      status.textContent = '';
      if (qrInstance) { qrInstance.clear(); qrInstance = null; }
      return;
    }

    try {
      // Clear previous
      if (qrInstance) { qrInstance.clear(); qrInstance = null; }

      // Render directly into preview div (qrcodejs creates canvas internally)
      qrInstance = new QRCode(preview, {
        text: text,
        width: 200,
        height: 200,
        colorDark: '#000000',
        colorLight: '#ffffff',
        correctLevel: QRCode.CorrectLevel.M
      });

      status.textContent = 'OK: "' + text.slice(0, 40) + '"';
      debugEl.textContent = 'QRCode instance created. El children: ' + preview.children.length;
    } catch (e) {
      errorEl.textContent = 'Error: ' + e.message;
      status.textContent = '';
    }
  }

  // Live update on every keystroke
  input.addEventListener('input', () => renderQR(input.value));

  // Initial test
  renderQR('Hello, QR Code!');
  input.value = 'Hello, QR Code!';
</script>
</body>
</html>
